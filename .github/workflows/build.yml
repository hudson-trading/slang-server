name: CI Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      upload_artifacts:
        description: 'Upload build artifacts'
        required: false
        type: boolean
        default: false
      ref:
        description: 'Git ref to checkout (branch, tag, or commit)'
        required: false
        type: string
        default: ''
  push:
    branches: [main, ci-test]
    paths-ignore:
      - 'docs/**'
      - 'clients/vscode/**'
      - '*.md'
      - 'mkdocs.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'clients/vscode/**'
      - '*.md'
      - 'mkdocs.yaml'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-clang
            preset: clang-release
            os: ubuntu-24.04
          - name: linux-arm64-clang
            preset: clang-release
            os: ubuntu-24.04-arm
          - name: linux-x64-clang-debug
            preset: clang-debug
            os: ubuntu-24.04
            skip_pytests: true
            skip_neovim_tests: true
            skip_upload: true
          - name: linux-x64-gcc
            preset: gcc-release
            os: ubuntu-24.04
            # to support older libc
          - name: old-linux-x64-gcc
            preset: gcc-release
            os: ubuntu-24.04
            container: rockylinux:8
            cmake_args: -DCMAKE_CXX_COMPILER=/opt/rh/gcc-toolset-14/root/usr/bin/g++
          - name: macos
            preset: macos-release
            os: macos-15
          - name: windows-x64
            preset: win64-release
            os: windows-latest
          - name: windows-arm64
            preset: winarm64-release
            os: windows-11-arm

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    env:
      SLANG_SERVER_ARTIFACT_NAME: slang-server-${{ matrix.name }}
    steps:
      - name: Install dependencies (Rocky Linux 8)
        if: matrix.container == 'rockylinux:8'
        run: |
          dnf -y update
          dnf -y install 'dnf-command(config-manager)'
          dnf config-manager --set-enabled powertools
          dnf -y install epel-release
          dnf -y install gcc-c++ clang git make gcc-toolset-14-gcc-c++ gcc-toolset-14-libatomic-devel python39-pip
          # Need newer cmake
          python3.9 -m pip install --upgrade pip
          python3.9 -m pip install cmake==3.31.6
          cmake --version
      - name: Install Clang 21 (Ubuntu)
        if: startsWith(matrix.preset, 'clang-')
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main"
          sudo apt-get update
          sudo apt-get install -y clang-21
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: true
          fetch-depth: 0
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: ${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
      - uses: maxim-lobanov/setup-xcode@v1
        if: runner.os == 'macOS'
        with:
          xcode-version: 'latest'

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DSLANG_CI_BUILD=ON ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} -j8

      - name: Run ctest
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --no-tests=error -j8

      - name: Set up uv
        if: matrix.skip_pytests != true
        uses: astral-sh/setup-uv@v6

      - name: Run pytest (Linux/macOS)
        if: runner.os != 'Windows' && matrix.skip_pytests != true
        run: |
          uv venv
          source .venv/bin/activate
          uv sync
          pytest tests/system/ --binary build/${{ matrix.preset }}/bin/slang-server

      - name: Run pytest (Windows)
        if: runner.os == 'Windows' && matrix.skip_pytests != true
        run: |
          uv venv
          .venv\Scripts\activate
          uv sync
          pytest tests\system\ --binary build\${{ matrix.preset }}\bin\slang-server.exe

      - name: Run Neovim plugin tests
        # This should work on Windows as well, but there's some linker error
        # that I don't feel like debugging via GH
        # Also skip rockylinux since the container makes action-setup-vim sad
        # This can easily be fixed by copying instead of moving the neovim install,
        # unfortunately that uncovers the fact that the neovim builds from that
        # GH action require a newer GLIBC version than rockylinux provides.
        # Not going down that rabbit hole right now
        if: runner.os != 'Windows' && matrix.container == '' && matrix.skip_neovim_tests != true
        uses: nvim-neorocks/nvim-busted-action@v1
        env:
          SLANG_SERVER_BIN: ../../build/${{ matrix.preset }}/bin/slang-server
        with:
          luarocks_args: 'clients/neovim/slang-server.nvim-scm-1.rockspec --test-type busted -- -C clients/neovim/'

      - name: Package release artifact
        if: inputs.upload_artifacts && !matrix.skip_upload
        shell: bash
        run: |
          mkdir -p release-artifacts

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            cp build/${{ matrix.preset }}/bin/slang-server.exe release-artifacts/slang-server.exe
          else
            cp build/${{ matrix.preset }}/bin/slang-server release-artifacts/slang-server
            chmod +x release-artifacts/slang-server
            if [[ "${RUNNER_OS}" == "Linux" ]]; then
              strip release-artifacts/slang-server
            fi
          fi

          cat > release-artifacts/README.txt <<EOF
          Slang Server - SystemVerilog Language Server

          This is a pre-built binary of slang-server.

          Installation:
          1. Extract this archive
          2. Add the binary to your PATH, or
          3. Configure your editor to use the absolute path to this binary

          For more information, visit:
          https://github.com/hudson-trading/slang-server

          Platform: ${{ env.SLANG_SERVER_ARTIFACT_NAME }}
          Build date: $(date -u +%Y-%m-%d)
          EOF

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            (cd release-artifacts && 7z a ../${{ env.SLANG_SERVER_ARTIFACT_NAME }}.zip *)
          else
            tar -czf ${{ env.SLANG_SERVER_ARTIFACT_NAME }}.tar.gz -C release-artifacts .
          fi

      - name: Upload artifact
        if: inputs.upload_artifacts && !matrix.skip_upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SLANG_SERVER_ARTIFACT_NAME }}
          path: |
            ${{ env.SLANG_SERVER_ARTIFACT_NAME }}.tar.gz
            ${{ env.SLANG_SERVER_ARTIFACT_NAME }}.zip
          retention-days: 7
