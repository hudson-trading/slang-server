repository:
  keywords:
    defaults:
      body: "${label}"
    variants:
      - label: logic
      - label: assign
      - label: wire
      - label: reg

  scalar-types:
    defaults:
      value: value
      declaration: "${type} ${1:${name}} = ${2:${value}};"

    variants:
      - type: bit
        name: bit_name
      - type: int
        name: int_name
      - type: shortint
        name: name
      - type: longint
        name: name
      - type: byte
        name: byte_name

  struct-enum-union-types:
    defaults:
      name: struct_name
      body: |
        ${tokens} {
        	$0
        } ${1:${name}};
      documentation: "${tokens} { ... } name"
      context:
        - ModuleMember
        - ${context_variant}

    variants:
      - tokens: struct
      - tokens: typedef struct
        context_variant:
          - CompilationUnit
      - tokens: struct packed
      - tokens: typedef struct packed
        context_variant:
          - CompilationUnit
      - tokens: enum
      - tokens: typedef enum
        context_variant:
          - CompilationUnit
      - tokens: union
      - tokens: union packed
      - tokens: typedef union
        context_variant:
          - CompilationUnit
      - tokens: typedef union packed
        context_variant:
            - CompilationUnit
      
  block-snippets:
    defaults:
      body: |
        ${open}
        	$0
        ${close}
      documentation: "${open} ... ${close}"
      context:
        - ModuleMember

    variants:
      # how is this used? in what context
      - label: fork join
        open: fork
        close: join

      - label: always_comb
        open: always_comb begin
        close: end

      - label: always_latch
        open: always_latch begin
        close: end

      - label: begin end
        open: begin
        close: end
  
  case:
    defaults:
      body: |
        ${label} (${0:expression})
        	${1:expression_case}: ${2:statement}
        endcase
      documentation: "${label} ... ${endcase}"
      context:
        - Procedural

    variants: # TODO: think about separating regular cases and adding a default?
      - label: case
      - label: casez
      - label: casex
      - label: unique case
      - label: unique casez
      - label: unique casex
      - label: unique0 case
      - label: unique0 casez
      - label: unique0 casex
      - label: priority case
      - label: priority casez
      - label: priority casex

  classes:
    snippets:
      - label: class
        body: |
          class ${1:className};
          	function new();
          		$0
          	endfunction : new
          endclass : $1
        documentation: "class name; ... endclass"
        context:
          - CompilationUnit

      - label: class extends
        filterText: class extends
        body: |
          class ${1:className} extends ${2:superClass};
          	function new();
          		$0
          	endfunction : new
          endclass : $1
        documentation: "class name extends super; ... endclass"
        context:
          - CompilationUnit

  tasks:
    snippets:
      - label: task
        body: |
          task ${1:automatic} ${2:taskName}(${3:arguments});
            $0
          endtask : $1
        documentation: "task name; ... endtask"
        context:
          - CompilationUnit
          - ModuleMember

  packages:
    snippets:
      - label: package
        body: |
          package ${1:package_name}
          	$2
          endpackage : $1
        documentation: "package name; ... endpackage"
        context:
          - CompilationUnit

      - label: import
        body: "import ${1:name}::${2:scope};"
        documentation: "import name::scope"
        context:
          - CompilationUnit

  interfaces:
    snippets:
      - label: interface
        body: |
          interface ${1:interfacename};
          	$0
          endinterface : $1
        documentation: "interface name; ... endinterface"
        context:
          - CompilationUnit

      - label: modport
        body: |
          modport ${1:identifier} (
          input ${2:input_ports},
          output ${3:output_ports}
          );
        documentation: "modport name (input ports_in, output ports_out); "
        context:
          - ModuleMember

  misc:
    snippets:
      - label: display
        body: "\\$display(\"$1\"$2);$0"
        documentation: "$display(\"...\", params...)"
        context:
          - Procedural

      - label: queue
        body: "${1:data_type} ${2:queue_name}[\\$];"
        documentation: "insert queue."

      - label: mailbox
        body: |
          mailbox mbx
          ${1:mbx = new();}
        documentation: "insert mailbox instance"

      - label: assert
        body: |
          assert (${1:condition}) $2
          else   ${3:error_process}
        documentation: "insert assert() ... else ..."
        context:
          - Procedural

      - label: always_ff
        body: |
          always_ff @($0) begin
          	$1
          end
        documentation: "always_ff @(...) ... end"
        context:
          - Procedural