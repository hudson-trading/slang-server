# each entry under repository can either hold:
#   - defaults + variants
#     - defaults: a set of default values for all snippets in 
#          the variants list
#     - variants: a list of snippets that will be generated by 
#          applying the defaults and overriding with any values 
#          specified in the variant
#             - like cmake so if a value is set in the variant, it will 
#               override the default, unless you specify to the default
#               in the list
#   - a list of snippets
#      - label (required)
#      - detail (optional, defaults to empty string)
#      - description (optional, defaults to label)
#      - documentation (optional, automatically generated)
#      - filterText (optional, defaults to label)
#      - body (required; ie: insertText)
#      - context

repository:
  keywords:
    defaults:
      body: "${label}"
    variants:
      - label: logic
      - label: assign
      - label: wire
      - label: reg
      - label: typedef

  scalar-types:
    defaults:
      value: value
      declaration: "${type} ${1:${name}} = ${2:${value}};"

    variants:
      - type: bit
        name: bit_name
      - type: int
        name: int_name
      - type: shortint
        name: name
      - type: longint
        name: name
      - type: byte
        name: byte_name

  typedef-struct-enum-union-types:
    defaults:
      body: |
        typedef ${label} {
        	$1
        } ${0:${label}_name};
      filterText: "typedef ${label}"
      documentation: "typedef ${label} { ... } name"
      context:
        - ModuleMember
        - CompilationUnit
        - PackageMember
      detail: " typedef"

    variants:
      - label: struct
      - label: struct packed
      - label: enum
      - label: union
      - label: union packed

  struct-enum-union-types:
    defaults:
      body: |
        ${label} {
        	$1
        } ${0:${type}_name};
      documentation: "${label} { ... } name"
      context:
        - ModuleMember

    variants:
      - label: struct
      - label: struct packed
      - label: enum
      - label: union
      - label: union packed
      
  block-snippets:
    defaults:
      body: |
        ${open}
        	$0
        ${close}
      documentation: "${open} ... ${close}"
      context:
        - ModuleMember

    variants:
      # how is this used? in what context
      - label: fork join
        open: fork
        close: join
        context:
          - Procedural

      - label: begin end
        open: begin
        close: end
        context:
          - Procedural

      - label: always_comb
        open: always_comb begin
        close: end

      - label: always_latch
        open: always_latch begin
        close: end
  
  case:
    defaults:
      body: |
        ${label} (${0:expression})
        	${1:expression_case}: ${2:statement}
        endcase
      documentation: "${label} ... ${endcase}"
      context:
        - Procedural

    variants: # TODO: think about separating regular cases and adding a default?
      - label: case
      - label: casez
      - label: casex
      - label: unique case
      - label: unique casez
      - label: unique casex
      - label: unique0 case
      - label: unique0 casez
      - label: unique0 casex
      - label: priority case
      - label: priority casez
      - label: priority casex

  classes:
    - label: class
      body: |
        class ${1:className};
          function new();
            $0
          endfunction : new
        endclass : $1
      documentation: "class name; ... endclass"
      context:
        - CompilationUnit

    - label: class extends
      body: |
        class ${1:className} extends ${2:superClass};
          function new();
            $0
          endfunction : new
        endclass : $1
      documentation: "class name extends super; ... endclass"
      context:
        - CompilationUnit

  task-functions:
    default:
      body: |
        ${label} ${0:${label}Name}(${1:arguments});
          $2
        endtask : $0
      documentation: "${label} name; ... end${label}"
      context:
        - CompilationUnit
        - ModuleMember
    
    variants:
      - label: task
      - label: function
    
  task-functions-automatic:
    default:
      body: |
        ${label} automatic ${0:${label}Name}(${1:arguments});
          $2
        endtask : $0
      documentation: "${label} name; ... end${label}"
      detail: " automatic"
      context:
        - CompilationUnit
        - ModuleMember
    
    variants:
      - label: task
      - label: function

  packages:
    - label: package
      body: |
        package ${1:package_name}
          $2
        endpackage : $1
      documentation: "package name; ... endpackage"
      context:
        - CompilationUnit

    - label: import
      body: "import ${1:name}::${2:scope};"
      documentation: "import name::scope"
      context:
        - CompilationUnit

  interfaces:
    - label: interface
      body: |
        interface ${1:interfacename};
          $0
        endinterface : $1
      documentation: "interface name; ... endinterface"
      context:
        - CompilationUnit

    - label: modport
      body: |
        modport ${1:identifier} (
        input ${2:input_ports},
        output ${3:output_ports}
        );
      documentation: "modport name (input ports_in, output ports_out);"
      context:
        - ModuleMember

  misc:
    - label: display
      body: "\\$display(\"$1\"$2);$0"
      documentation: "$display(\"...\", params...)"
      context:
        - Procedural

    - label: queue
      body: "${1:data_type} ${2:queue_name}[\\$];"
      documentation: "insert queue."

    - label: mailbox
      body: |
        mailbox mbx
        ${1:mbx = new();}
      documentation: "insert mailbox instance"

    - label: assert
      body: |
        assert (${1:condition}) $2
        else   ${3:error_process}
      documentation: "insert assert() ... else ..."
      context:
        - Procedural

    - label: always_ff
      body: |
        always_ff @($0) begin
          $1
        end
      documentation: "always_ff @(...) ... end"
      context:
        - ModuleMember